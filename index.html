<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment to Mansion Journey</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stocks.css">
    <link rel="stylesheet" href="jobs.css">
    <link rel="stylesheet" href="slots.css">
</head>
<body>

<h1>Apartment to Mansion Journey</h1>

<div id="game-wrapper">
    <div id="board-container">
        <div id="player">ME</div>
        <div id="board"></div>
    </div>

    <div id="sidebar">
        <h3>📊 Live Finances</h3>
        <div class="stat-card" id="job-stat">💼 Job: <span id="jobDisplay">Unemployed</span></div>
        <div class="stat-card" style="border-left-color: #e67e22;">
            🧠 Stress: <span id="stressDisplay">0%</span>
            <div id="stress-bar-container">
                <div id="stress-bar"></div>
            </div>
        </div>
        <div class="stat-card">💰 Savings: $<span id="money">5000</span></div>
        <div class="stat-card">📈 Shares: <span id="shares">0</span></div>
        <div class="stat-card">🏦 Roth IRA: $<span id="roth">0</span></div>
        <div class="stat-card debt-card">🚨 Debt: $<span id="debt">0</span></div>
        
        <div class="stat-card" style="border-left-color: #9b59b6;">💳 Credit Score: <span id="creditScore">700</span></div>
        <div class="stat-card">🛡️ Insurance: <span id="insStatus">None</span></div>
        <div class="stat-card">🎂 Age: <span id="ageDisplay">20</span></div>
        <div class="stat-card" style="background:#e1f5fe; border-left-color:#03a9f4;">🎯 Goal: <span id="goalDisplay">None</span></div>
    
        <div id="dice-area">
            <div id="dice">🎲</div>
            <button class="roll-btn" id="rollBtn" disabled>Advance One Year</button>
            <button class="roll-btn" id="marketBtn" style="background: #2980b9; margin-top: 8px;">📈 Open Stock Market</button>
            <button class="roll-btn" id="slotsBtn" style="background: #8e44ad; margin-top: 8px;">🎰 Volatility Slots</button>
        </div>
    
        <div id="event-display">
            <p id="event-text">Choose your retirement goal and career to begin!</p>
            <div id="choices" class="choice-btns"></div>
        </div>
    </div>

<script src="slots.js"></script>
<script src="events.js"></script>
<script src="stocks.js"></script>
<script src="game.js"></script>

</body>
</html>
