<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment to Mansion Journey - Board Game</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #e67e22;
            --danger: #e74c3c;
            --bg: #ecf0f1;
            --tile-size: 80px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #game-wrapper {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #board-container {
            position: relative;
            background: #d4a373; 
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 8px solid #8b4513;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(5, var(--tile-size));
            grid-template-rows: repeat(4, var(--tile-size));
            gap: 10px;
        }

        .tile {
            width: var(--tile-size);
            height: var(--tile-size);
            background: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 4px solid #bdc3c7;
            position: relative;
        }

        .tile.special { background: #ffeaa7; border-color: #fdcb6e; }
        .tile.finish { background: var(--secondary); color: white; border-color: #1e8449; }

        #player {
            width: 40px;
            height: 40px;
            background: var(--danger);
            border: 3px solid white;
            border-radius: 50%;
            position: absolute;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        #sidebar {
            width: 300px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-card {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid var(--primary);
            transition: transform 0.2s;
        }

        .stat-card.debt-card { border-left-color: var(--danger); color: var(--danger); }

        #event-display {
            background: #fff3cd;
            border: 2px solid #ffeeba;
            padding: 15px;
            border-radius: 8px;
            min-height: 120px;
            margin-top: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        #dice {
            width: 60px;
            height: 60px;
            background: white;
            border: 3px solid var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .roll-btn {
            margin-top: 10px;
            padding: 10px 20px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .choice-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .choice-btns button { 
            padding: 8px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
            font-size: 0.85rem;
        }
        .choice-btns button:hover { background: var(--accent); }

    </style>
</head>
<body>

<h1>Apartment to Mansion Journey</h1>

<div id="game-wrapper">
    <div id="board-container">
        <div id="player">ME</div>
        <div id="board"></div>
    </div>

    <div id="sidebar">
        <h3>Live Finances</h3>
        <div class="stat-card">Savings: $<span id="money">5000</span></div>
        <div class="stat-card">Roth IRA: $<span id="roth">0</span></div>
        <div class="stat-card debt-card">Payday Loan: $<span id="debt">0</span></div>
        <div class="stat-card">Current Age: <span id="ageDisplay">20</span></div>

        <div id="dice-area">
            <div id="dice">?</div>
            <button class="roll-btn" id="rollBtn" onclick="rollDice()">End Year (Roll Dice)</button>
        </div>

        <div id="event-display">
            <p id="event-text">Roll to begin. Beware of high-interest debt!</p>
            <div id="choices" class="choice-btns"></div>
        </div>
    </div>
</div>

<script>
    const APT_FEES = 1800;
    const LUXURY_ITEM = 1200;
    const ROTH_CONTRIBUTION = 1500;
    const INTEREST_RATE = 0.15; // 15% per turn - the "trap"

    let player = {
        pos: 0,
        money: 5000,
        roth: 0,
        debt: 0,
        age: 20,
        hasApt: false
    };

    const boardPath = [
        { id: 0, label: "Start", x: 0, y: 0 },
        { id: 1, label: "First Job", x: 1, y: 0 },
        { id: 2, label: "Savings Sq", x: 2, y: 0 },
        { id: 3, label: "Apt Hunt", x: 3, y: 0, type: 'special' },
        { id: 4, label: "Bills Due", x: 4, y: 0 },
        { id: 5, label: "Work Trip", x: 4, y: 1 },
        { id: 6, label: "Bonus!", x: 3, y: 1 },
        { id: 7, label: "Market", x: 2, y: 1 },
        { id: 8, label: "Sale!", x: 1, y: 1, type: 'special' },
        { id: 9, label: "Side Gig", x: 0, y: 1 },
        { id: 10, label: "IRS Visit", x: 0, y: 2, type: 'special' },
        { id: 11, label: "Emergency", x: 1, y: 2 },
        { id: 12, label: "Promotion", x: 2, y: 2 },
        { id: 13, label: "Insurance?", x: 3, y: 2 },
        { id: 14, label: "Salary Bump", x: 4, y: 2 },
        { id: 15, label: "Roth IRA", x: 4, y: 3, type: 'special' },
        { id: 16, label: "Investment", x: 3, y: 3 },
        { id: 17, label: "Healthcare", x: 2, y: 3 },
        { id: 18, label: "Final Stretch", x: 1, y: 3 },
        { id: 19, label: "Mansion!", x: 0, y: 3, type: 'finish' }
    ];

    function initBoard() {
        const boardEl = document.getElementById('board');
        boardPath.forEach(tile => {
            const el = document.createElement('div');
            el.className = `tile ${tile.type || ''}`;
            el.id = `tile-${tile.id}`;
            el.style.gridColumnStart = tile.x + 1;
            el.style.gridRowStart = tile.y + 1;
            el.innerHTML = `<span>${tile.label}</span><br><small>Age ${tile.id + 20}</small>`;
            boardEl.appendChild(el);
        });
        movePlayer();
    }

    function movePlayer() {
        const target = boardPath[player.pos];
        const playerEl = document.getElementById('player');
        playerEl.style.left = `${target.x * 90 + 40}px`;
        playerEl.style.top = `${target.y * 90 + 40}px`;
        
        // Update Stats
        document.getElementById('money').innerText = Math.floor(player.money).toLocaleString();
        document.getElementById('roth').innerText = Math.floor(player.roth).toLocaleString();
        document.getElementById('debt').innerText = Math.floor(player.debt).toLocaleString();
        document.getElementById('ageDisplay').innerText = player.age;
    }

    async function rollDice() {
        document.getElementById('rollBtn').disabled = true;
        const diceEl = document.getElementById('dice');
        let roll = 0;
        
        for(let i=0; i<10; i++){
            roll = Math.floor(Math.random() * 3) + 1;
            diceEl.innerText = roll;
            await new Promise(r => setTimeout(r, 50));
        }

        // Apply Interest on Debt every roll
        if(player.debt > 0) {
            player.debt *= (1 + INTEREST_RATE);
        }

        player.pos += roll;
        player.age += roll;
        if (player.pos >= boardPath.length - 1) player.pos = boardPath.length - 1;
        
        movePlayer();
        handleSquare(player.pos);
    }

    function handleSquare(pos) {
        const text = document.getElementById('event-text');
        const choices = document.getElementById('choices');
        choices.innerHTML = "";

        if (pos === 3 && !player.hasApt) {
            text.innerHTML = `<strong>Apartment Hunt:</strong> Move-in costs are $1,800.`;
            addButton("Pay Cash", () => { player.money -= APT_FEES; player.hasApt = true; nextTurn(); });
            addButton("Take Payday Loan", () => { player.debt += APT_FEES; player.hasApt = true; nextTurn(); });
        } 
        else if (pos === 8) {
            text.innerHTML = `<strong>Flash Sale:</strong> A Luxury Item is $1,200. "Want vs Need?"`;
            addButton("Ignore (Apply 24-hr Rule)", nextTurn);
            addButton("Buy on Credit (Add Debt)", () => { player.debt += LUXURY_ITEM; nextTurn(); });
        }
        else if (pos === 10) {
            const tax = Math.floor(player.money * 0.15);
            text.innerHTML = `<strong>Tax Audit:</strong> You owe $${tax} in progressive taxes.`;
            addButton("Pay Government", () => { player.money -= tax; nextTurn(); });
        }
        else if (pos === 15) {
            text.innerHTML = `<strong>Roth IRA:</strong> Maximize tax-free growth with $1,500?`;
            addButton("Invest $1,500", () => { player.money -= 1500; player.roth += 1500; nextTurn(); });
            addButton("Skip Year", nextTurn);
        }
        else if (pos === 19) {
            let total = player.money + player.roth - player.debt;
            text.innerHTML = `<strong>FINAL SCORE:</strong> $${Math.floor(total).toLocaleString()}.<br>Net Worth is your final grade!`;
        }
        else {
            // RANDOM LIFE EVENT LOGIC (Percentages)
            const rand = Math.random();
            if (rand < 0.25) { // 25% chance of an issue
                text.innerHTML = `<strong>Car Leak!</strong> Your car ran out of coolant. Do you risk the drive to work or fix it?`;
                addButton("Risk It (40% Failure chance)", () => {
                    if(Math.random() < 0.4) {
                        alert("Engine blew up! -$2,500");
                        player.money -= 2500;
                    }
                    nextTurn();
                });
                addButton("Go to Shop (-$200)", () => { player.money -= 200; nextTurn(); });
            } else {
                text.innerText = "The year was quiet. Interest on any debt still accrued.";
                document.getElementById('rollBtn').disabled = false;
            }
        }
    }

    function addButton(label, action) {
        const btn = document.createElement('button');
        btn.innerText = label;
        btn.onclick = action;
        document.getElementById('choices').appendChild(btn);
    }

    function nextTurn() {
        document.getElementById('choices').innerHTML = "";
        document.getElementById('event-text').innerText = "Decision logged. Roll for next year.";
        document.getElementById('rollBtn').disabled = false;
        movePlayer();
    }

    window.onload = initBoard;
</script>

</body>
</html>
